<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><meta name="theme-color" content="#082f49"/><meta name="description" content="Nexus Medical Transit — accessible medical transportation across the Washington Metropolitan Area."/><title>Nexus Medical Transit | Access Drives Equity</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Booking form now enabled - nexus-booking.js interceptor removed */
    /* Hide React form validation error indicators on address inputs */
    input[placeholder*="address" i]:invalid,
    input[placeholder*="pickup" i]:invalid,
    input[placeholder*="destination" i]:invalid {
      box-shadow: none !important;
      background-image: none !important;
    }
    input[placeholder*="address" i]:invalid::after,
    input[placeholder*="pickup" i]:invalid::after,
    input[placeholder*="destination" i]:invalid::after {
      display: none !important;
    }
    /* Hide validation icons in form groups */
    .bookingFormGroup input:invalid,
    [role="dialog"] input:invalid {
      box-shadow: inset 0 1px 3px rgba(0,0,0,.1) !important;
    }
    /* Phone and email validation styles */
    input[name="phone"]:invalid,
    input[name="email"]:invalid,
    input[type="tel"]:invalid,
    input[type="email"]:invalid {
      border-color: var(--error, #db2839) !important;
    }
    input[name="phone"]:valid,
    input[name="email"]:valid,
    input[type="tel"]:valid,
    input[type="email"]:valid {
      border-color: var(--line, #ccd8e1) !important;
    }
  </style>
  <script>
    /* Clear ?book=1 before React initializes to prevent React form from showing */
    if(window.location.search.includes('book=1')){
      window.__nexusAutoOpenBooking=true;
      history.replaceState(null,'',window.location.pathname);
    }
    
    // Error tracking for debugging
    window.__nexusErrors = [];
    window.addEventListener('error', (e) => {
      window.__nexusErrors.push({type: 'error', message: e.message, source: e.filename, line: e.lineno});
      console.error('[Nexus] Error:', e.message, 'at', e.filename, ':', e.lineno);
    });
    window.addEventListener('unhandledrejection', (e) => {
      window.__nexusErrors.push({type: 'unhandledRejection', reason: e.reason});
      console.error('[Nexus] Unhandled rejection:', e.reason);
    });
    console.log('[Nexus] Error monitoring initialized');
    
    /* Initialize Google Maps configuration before React loads */
    (function(){
      'use strict';
      
      // Fetch and cache Google Maps configuration
      let configCache = null;
      let configPromise = null;
      
      window.__nexusGetGoogleMapsConfig = async function() {
        if (configCache) return configCache;
        if (configPromise) return configPromise;
        
        configPromise = fetch('/api/integrations/config')
          .then(r => r.json())
          .then(c => {
            configCache = c;
            return c;
          })
          .catch(e => {
            console.warn('[Nexus] Failed to fetch Google Maps config:', e);
            return { googleMapsEnabled: false };
          });
        
        return configPromise;
      };
      
      // Inject the API key into window for use by React component
      window.__nexusGetGoogleMapsConfig().then(config => {
        if (config.googleMapsBrowserKey) {
          window.__NEXUS_GOOGLE_MAPS_KEY = config.googleMapsBrowserKey;
          console.log('[Nexus] Google Maps API key configured');
        }
      });
    })();
  </script>
  <script src="./trustedsite.js" defer></script>
  <script src="./i18n.js" defer></script>
