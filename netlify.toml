[build]
  command = "npm run db:migrate && npm run admin:create-test && npm run test:create-users && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.20.2"
  NPM_VERSION = "10.9.2"
  SECRETS_SCAN_SMART_DETECTION_OMIT_KEYS = "DATABASE_URL"
  NEXUS_ADMIN_EMAIL = "admin@nexusmt.com"
  NEXUS_ADMIN_PASSWORD = "NexusAdmin042!"

# Scheduled function: send ride reminders 1 hour before trip
[functions.ride-reminders]
  schedule = "*/15 * * * *"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
