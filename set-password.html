<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="Set your permanent Nexus Medical Transit password."><title>Set Password | Nexus Medical Transit</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet"><style>html{visibility:hidden}body{visibility:hidden}body{margin:0;font-family:'Source Sans 3',system-ui,sans-serif;background:radial-gradient(circle at top,#f0f7fb 0,#e6eef5 38%,#dce6ee 100%);color:#0f172a}.shell{max-width:1080px;margin:0 auto;padding:0 22px}.wrap{min-height:100vh;display:grid;place-items:center;padding:32px 0}.card{width:min(520px,100%);background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border:1px solid rgba(15,23,42,.08);border-radius:24px;box-shadow:0 24px 80px rgba(15,23,42,.12);padding:30px}.eyebrow{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;background:#e0f2fe;color:#075985;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-family:Manrope,sans-serif}.card h1{font-family:Manrope,sans-serif;font-size:clamp(30px,4vw,44px);line-height:1.05;margin:16px 0 10px}.card p{color:#475569;margin:0 0 18px;font-size:16px}.grid{display:grid;gap:14px}.field{display:grid;gap:8px;font-weight:700;color:#0f172a}.field input{padding:14px 15px;border:1px solid #cbd5e1;border-radius:14px;font:inherit;background:#fff}.field input:focus{outline:3px solid rgba(3,105,161,.18);border-color:#0284c7}.button{appearance:none;border:0;border-radius:14px;padding:14px 18px;font:inherit;font-weight:800;background:linear-gradient(135deg,#0f766e,#0b5f76);color:#fff;cursor:pointer}.button:disabled{opacity:.7;cursor:not-allowed}.status{margin-top:12px;min-height:24px;font-weight:700}.status.ok{color:#0f766e}.status.err{color:#b91c1c}.links{margin-top:16px;font-size:14px;color:#475569}.links a{color:#075985;font-weight:700;text-decoration:none}.links a:hover{text-decoration:underline}@media(max-width:640px){.card{padding:22px;border-radius:20px}}</style></head><body><a class="skip" href="#main">Skip to main content</a><main class="wrap shell" id="main"><section class="card"><div class="eyebrow">Password setup</div><h1>Create your permanent password</h1><p>Use the secure link from your invitation email to finish setting up your facility account.</p><div class="grid"><label class="field">New password<input id="password" type="password" autocomplete="new-password" minlength="12" placeholder="At least 12 characters"></label><label class="field">Confirm password<input id="confirmPassword" type="password" autocomplete="new-password" minlength="12" placeholder="Repeat your password"></label><button id="saveBtn" class="button" type="button">Save password</button><div id="status" class="status" aria-live="polite"></div></div><div class="links"><a href="/livecare.html">Return to Livecare sign in</a></div></section></main><script>const token=new URLSearchParams(location.search).get('token')||'';const status=document.getElementById('status');const button=document.getElementById('saveBtn');function setStatus(message,kind){status.textContent=message;status.className=`status ${kind||''}`.trim()}button.addEventListener('click',async()=>{const password=document.getElementById('password').value;const confirmPassword=document.getElementById('confirmPassword').value;if(!token){setStatus('This link is missing its token. Please use the email link again.','err');return;}if(password.length<12){setStatus('Password must be at least 12 characters.','err');return;}if(password!==confirmPassword){setStatus('Passwords do not match.','err');return;}button.disabled=true;button.textContent='Saving…';try{const r=await fetch('/api/auth/password-setup',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({token,password})});const data=await r.json();if(!r.ok)throw new Error(data.error||'Unable to save password');setStatus('Password saved. You can sign in now.','ok');button.textContent='Saved';document.getElementById('password').value='';document.getElementById('confirmPassword').value='';}catch(err){setStatus(err.message,'err');button.disabled=false;button.textContent='Save password';}});</script></body></html>
