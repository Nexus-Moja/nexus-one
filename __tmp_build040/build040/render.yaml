databases:
  - name: nexus-one-staging-db
    plan: basic-256mb
    databaseName: nexus_one_staging
    user: nexus_staging
    ipAllowList: []
  - name: nexus-one-production-db
    plan: basic-1gb
    databaseName: nexus_one_production
    user: nexus_production
    ipAllowList: []

services:
  - type: web
    name: nexus-one-staging
    runtime: docker
    plan: starter
    branch: develop
    autoDeploy: true
    healthCheckPath: /ready
    preDeployCommand: npm run db:migrate
    envVars:
      - key: APP_ENV
        value: staging
      - key: NODE_ENV
        value: production
      - key: DATABASE_PROVIDER
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-one-staging-db
          property: connectionString
      - key: DB_SSL
        value: true
      - key: APP_ORIGIN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_KEY
        generateValue: true
      - key: ENABLE_PREVIEW_ACCOUNTS
        value: false
      - key: ENABLE_MOCK_FLEET
        value: false

  - type: web
    name: nexus-one-production
    runtime: docker
    plan: starter
    branch: main
    autoDeploy: false
    healthCheckPath: /ready
    preDeployCommand: npm run db:migrate
    envVars:
      - key: APP_ENV
        value: production
      - key: NODE_ENV
        value: production
      - key: DATABASE_PROVIDER
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-one-production-db
          property: connectionString
      - key: DB_SSL
        value: true
      - key: APP_ORIGIN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_KEY
        generateValue: true
      - key: ENABLE_PREVIEW_ACCOUNTS
        value: false
      - key: ENABLE_MOCK_FLEET
        value: false
