name: Nexus Production CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nexus-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install, verify and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Confirm runtime versions
        run: |
          node --version
          npm --version

      - name: Install locked dependencies
        run: npm ci

      - name: Run production verification suite
        run: npm run verify

      - name: Run internationalization tests
        run: npm run test:i18n

      - name: Upload production build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-production-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
